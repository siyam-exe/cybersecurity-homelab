# Sanitized final rsyslog receiver for Metasploitable forwarded syslog.
# Copy to: /etc/rsyslog.d/20-metasploitable.conf
#
# Replace:
#   <VBOXNET_HOST_IP> with the homelab VirtualBox host-only address
#   <METASPLOITABLE_IP> with the Metasploitable host-only address

module(load="imudp")
input(type="imudp" port="514" address="<VBOXNET_HOST_IP>")

if $fromhost-ip == '<METASPLOITABLE_IP>' then /var/log/metasploitable/metasploitable.log
& stop
